{% extends 'base.html' %}
{% block page_title %}Delete image{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;">
  <div class="card-body">
    <h3>Delete this image?</h3>
    <img src="{{ object.image.url }}" alt="" style="max-width:240px;border-radius:8px;border:1px solid var(--gray-200);">
    <p style="margin-top:12px;">Prefix <strong>{{ object.prefix }}</strong> · {{ object.original_filename }}</p>
    <form method="post">{% csrf_token %}
      <a href="{% url 'image_bank:list' %}" class="btn btn-secondary">Cancel</a>
      <button class="btn btn-danger">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
