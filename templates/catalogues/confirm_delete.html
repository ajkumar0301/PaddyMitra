{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:520px;">
  <div class="card-body">
    <p>Delete catalogue <strong>{{ object.name }}</strong>? This will <em>not</em> delete the underlying documents.</p>
    <form method="post">{% csrf_token %}
      <a href="{% url 'catalogues:list' %}" class="btn btn-secondary">Cancel</a>
      <button class="btn btn-danger">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
