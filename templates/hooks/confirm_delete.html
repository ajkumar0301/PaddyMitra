{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:520px;">
  <div class="card-body">
    <p>Delete hook <strong>{{ object.name }}</strong>?</p>
    <form method="post">{% csrf_token %}
      <a href="{% url 'hooks:list' %}" class="btn btn-secondary">Cancel</a>
      <button class="btn btn-danger">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
